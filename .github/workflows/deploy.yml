name: Deploy to Reports on EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: reports-ec2-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Debug EC2_SSH_KEY presence
        run: |
          if [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then
            echo "ERROR: EC2_SSH_KEY is EMPTY or not visible to this workflow."
            exit 1
          else
            echo "EC2_SSH_KEY is set. Length: $(echo "${{ secrets.EC2_SSH_KEY }}" | wc -c) characters"
          fi

      - name: Write SSH key to file
        run: |
          mkdir -p "$HOME/.ssh"
          echo "${{ secrets.EC2_SSH_KEY }}" > "$HOME/.ssh/id_rsa"
          chmod 600 "$HOME/.ssh/id_rsa"
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts || true

      - name: Update code on EC2
        run: |
          SSH_OPTS="-i $HOME/.ssh/id_rsa -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=240 -o TCPKeepAlive=yes"
          ssh $SSH_OPTS ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "PROJECT_DIR='${{ secrets.EC2_TARGET_DIR }}' REPO_URL='https://github.com/${{ github.repository }}.git' DEPLOY_REF='${{ github.ref_name }}' DEPLOY_SHA='${{ github.sha }}' bash -s" <<'REMOTE'
          set -euo pipefail

          if ! command -v git >/dev/null 2>&1; then
            echo "[deploy] ERROR: git is not installed on the EC2 host."
            exit 1
          fi

          mkdir -p "$PROJECT_DIR"

          if [ ! -d "$PROJECT_DIR/.git" ]; then
            echo "[deploy] Bootstrapping git metadata in $PROJECT_DIR"
            tmp_dir="$(mktemp -d)"
            git clone --no-checkout "$REPO_URL" "$tmp_dir"
            cp -a "$tmp_dir/.git" "$PROJECT_DIR/.git"
            rm -rf "$tmp_dir"
          fi

          cd "$PROJECT_DIR"
          git remote set-url origin "$REPO_URL" || git remote add origin "$REPO_URL"
          git fetch --prune origin "$DEPLOY_REF"
          git reset --hard "$DEPLOY_SHA"
          git clean -ffd \
            -e .env \
            -e .env.prod \
            -e media/ \
            -e staticfiles/ \
            -e var/ \
            -e backups/ \
            -e '*.sqlite3' \
            -e '*.sqlite3-journal'
          echo "[deploy] EC2 code is now at $(git rev-parse --short HEAD)"
          REMOTE

      - name: Run deploy script on EC2
        run: |
          SSH_OPTS="-i $HOME/.ssh/id_rsa -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=240 -o TCPKeepAlive=yes"
          ssh $SSH_OPTS ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "cd ${{ secrets.EC2_TARGET_DIR }} && chmod +x deploy.sh && ./deploy.sh"
